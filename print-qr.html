<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노노그램 활동 QR 인쇄</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background: #f7fafc;
      color: #16202a;
    }

    main {
      width: min(760px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 28px 0;
    }

    .sheet {
      width: 100%;
      padding: 46px;
      border: 1px solid #dce6f1;
      border-radius: 8px;
      background: white;
      text-align: center;
      box-shadow: 0 18px 45px rgba(22, 32, 42, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 44px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #536170;
      font-size: 20px;
      line-height: 1.5;
    }

    .qr {
      width: 360px;
      max-width: 100%;
      aspect-ratio: 1;
      margin: 34px auto 24px;
      padding: 16px;
      border: 1px solid #dce6f1;
      border-radius: 8px;
      background: #fff;
    }

    .qr img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .url {
      padding: 14px;
      border: 1px solid #dce6f1;
      border-radius: 8px;
      background: #fbfdff;
      color: #536170;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
    }

    button,
    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid #2b7de9;
      border-radius: 8px;
      background: #2b7de9;
      color: white;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    a {
      background: white;
      color: #2b7de9;
    }

    @media print {
      body {
        background: white;
      }

      main {
        width: 100%;
        min-height: auto;
        padding: 0;
      }

      .sheet {
        border: 0;
        box-shadow: none;
      }

      .buttons {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="sheet">
      <h1>노노그램 활동</h1>
      <p>QR 코드를 스캔해 활동에 참여하세요.</p>
      <div class="qr">
        <img id="qr" alt="노노그램 활동 QR 코드">
      </div>
      <div class="url" id="url"></div>
      <div class="buttons">
        <button type="button" onclick="window.print()">인쇄하기</button>
        <a href="./index.html">첫 화면</a>
      </div>
    </section>
  </main>

  <script>
    const landingUrl = new URL("./index.html", window.location.href).href;
    document.getElementById("qr").src = "https://api.qrserver.com/v1/create-qr-code/?size=720x720&margin=16&data=" + encodeURIComponent(landingUrl);
    document.getElementById("url").textContent = landingUrl;
  </script>
</body>
</html>
